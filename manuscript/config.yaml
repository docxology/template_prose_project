  version: "0.4.2"

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

publication:
  doi: "10.5281/zenodo.20417104" # Concept DOI — stable citation
  version_doi: "10.5281/zenodo.20932047" # Latest Zenodo deposit
  version_record: "https://zenodo.org/records/20932047"
  year: "2026"
  github_repository: "docxology/template_prose_project"
  repository_url: "https://github.com/docxology/template_prose_project"
