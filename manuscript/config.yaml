metadata:
  license: "MIT"
  language: "en"

# Path to the manuscript directory, relative to project root.
manuscript_dir: "manuscript"

# ---------------------------------------------------------------------------
# Render format toggles. Five booleans gate the corresponding renderer in
# infrastructure/rendering/pipeline.py. Defaults: pdf/html/slides on, docx/
# epub off. Setting `false` causes the pipeline to log
# `[skip] <format> rendering disabled in config` and emit no artifacts for
# that format. See docs/operational/logging/output-design.md.
# ---------------------------------------------------------------------------
render:
  formats:
    pdf: true
    html: true
    slides: true
    docx: false
    epub: false

# ---------------------------------------------------------------------------
# Prose-analysis thresholds.
#
# Every knob below has a documented default in src/config.py
# (ProseAnalysisConfig). Sensible bounds are noted inline; the pipeline
# does not enforce hard min/max but values outside the suggested range
# will produce noisy or meaningless reports.
# ---------------------------------------------------------------------------
prose:
  # FKGL band the manuscript should land within. Default targets a
  # university-graduate audience without being needlessly dense.
  # Sensible range: min ∈ [0, 14], max ∈ [10, 22]. min must be ≤ max.
  target_grade_level_min: 10.0
  target_grade_level_max: 18.0

  # Words-per-sentence cutoff above which a sentence is flagged as long
  # in the per-file QualityReport. Wired through to
  # `analyze_quality(..., long_sentence_threshold=...)`. Sensible
  # range: 20–50. Default 35 corresponds to roughly the upper quartile
  # of academic prose.
  long_sentence_threshold: 35

  # Minimum citations per 1000 words. Set to 0 to disable. The bundled
  # manuscript is methodological prose with light citation; the floor
  # is 0 so the bundled run is green out of the box. Tighten for
  # projects that rely on heavy citation density (e.g. literature
  # reviews typically run 8–20 / 1000 words).
  citation_density_min_per_1000: 0.0

  # Structural rules. Both default true; flip to false if your manuscript
  # intentionally uses non-standard heading conventions (e.g. front-matter
  # files with no H1).
  require_h1_per_section: true
  forbid_skipped_levels: true

# ---------------------------------------------------------------------------
# Bibliography cross-check.
# ---------------------------------------------------------------------------
bibliography:
  references_path: "manuscript/references.bib"
  fail_on_missing: true   # cited [@key] not in bib → fail
  fail_on_unused: false   # bib entry never cited → warn only

# ---------------------------------------------------------------------------
# Final markdown review report.
#
# Toggling any of the include_* flags to false suppresses the
# corresponding section in output/review_report.md. The headline counts
# and the checks table are always rendered.
# ---------------------------------------------------------------------------
report:
  output_path: "output/review_report.md"
  include_per_file_table: true   # words/sentences/FRE/FKGL/Fog per file
  include_outline: true          # heading outline per file
  include_quality_flags: true    # long sentences, passive candidates, hedges
