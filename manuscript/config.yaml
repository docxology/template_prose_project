    ipfs_pinata: "https://gateway.pinata.cloud/ipfs/QmXXUgas1amP7Pd9rRoTdJQiNUzBqKQ4r3Jf85aaGEnjz4"
    huggingface_hub: "https://huggingface.co/datasets/ActiveInference/template_prose_project"
